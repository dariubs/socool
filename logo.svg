<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 120" width="576" height="120">
  <title>socool logo</title>

  <!-- Row 0: top frame -->
  <rect x="0"   y="0"  width="24"  height="24" fill="#FFD700"/>
  <rect x="24"  y="0"  width="240" height="24" fill="#FF8C00"/>
  <rect x="264" y="0"  width="48"  height="24" fill="#FFD700"/>
  <rect x="312" y="0"  width="240" height="24" fill="#FF8C00"/>
  <rect x="552" y="0"  width="24"  height="24" fill="#FFD700"/>

  <!-- Row 1: top lens row — shine at pos 0, glow at pos 1, dark for rest -->
  <rect x="0"   y="24" width="24"  height="24" fill="#FFD700"/>
  <rect x="24"  y="24" width="24"  height="24" fill="#FF8C00"/>
  <rect x="48"  y="24" width="24"  height="24" fill="#FFEE44"/>
  <rect x="72"  y="24" width="24"  height="24" fill="#FF9900"/>
  <rect x="96"  y="24" width="144" height="24" fill="#111111"/>
  <rect x="240" y="24" width="24"  height="24" fill="#FF8C00"/>
  <rect x="264" y="24" width="48"  height="24" fill="#FFD700"/>
  <rect x="312" y="24" width="24"  height="24" fill="#FF8C00"/>
  <rect x="336" y="24" width="24"  height="24" fill="#FFEE44"/>
  <rect x="360" y="24" width="24"  height="24" fill="#FF9900"/>
  <rect x="384" y="24" width="144" height="24" fill="#111111"/>
  <rect x="528" y="24" width="24"  height="24" fill="#FF8C00"/>
  <rect x="552" y="24" width="24"  height="24" fill="#FFD700"/>

  <!-- Rows 2-3: dark lens body -->
  <rect x="0"   y="48" width="24"  height="48" fill="#FFD700"/>
  <rect x="24"  y="48" width="24"  height="48" fill="#FF8C00"/>
  <rect x="48"  y="48" width="192" height="48" fill="#111111"/>
  <rect x="240" y="48" width="24"  height="48" fill="#FF8C00"/>
  <rect x="264" y="48" width="48"  height="48" fill="#FFD700"/>
  <rect x="312" y="48" width="24"  height="48" fill="#FF8C00"/>
  <rect x="336" y="48" width="192" height="48" fill="#111111"/>
  <rect x="528" y="48" width="24"  height="48" fill="#FF8C00"/>
  <rect x="552" y="48" width="24"  height="48" fill="#FFD700"/>

  <!-- Row 4: bottom frame -->
  <rect x="0"   y="96" width="24"  height="24" fill="#FFD700"/>
  <rect x="24"  y="96" width="240" height="24" fill="#FF8C00"/>
  <rect x="264" y="96" width="48"  height="24" fill="#FFD700"/>
  <rect x="312" y="96" width="240" height="24" fill="#FF8C00"/>
  <rect x="552" y="96" width="24"  height="24" fill="#FFD700"/>
</svg>
